<style>
:root{
  --g1:#26F247;--g2:#01E9CB;
  --dark-green:#0B622D;--mid-green:#00796A;
  --black:#272727;--warm-off:#EFF4ED;--sand:#F2EEE0;
  --muted:#919D8E;--white:#ffffff;--nav-bg:#EFEFED;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--warm-off);color:var(--black);line-height:1.6;min-height:100vh}

.nav{background:var(--nav-bg);border-bottom:1px solid rgba(39,39,39,.1);padding:0 40px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:0;cursor:pointer;text-decoration:none}
.nav-logo-img{height:28px;width:auto;display:block}
.nav-divider{width:1px;height:20px;background:rgba(39,39,39,.15);margin:0 20px;flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-link{font-size:14px;font-weight:500;color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;transition:color .15s,background .15s;text-decoration:none;white-space:nowrap}
.nav-link:hover{color:var(--black);background:rgba(39,39,39,.06)}
.nav-cta{margin-left:auto;background:var(--g1);color:var(--black);font-size:13px;font-weight:700;padding:8px 20px;border-radius:24px;border:none;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background .15s}
.nav-cta:hover{background:var(--g2)}

.sticky-header{background:var(--warm-off)}
.sticky-header-inner{max-width:760px;margin:0 auto;padding:56px 24px 22px}

.wrap{max-width:760px;margin:0 auto;padding:32px 24px 100px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:20px}
.back-link:hover{color:var(--black)}

.art-pub-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dark-green);background:rgba(11,98,45,.08);padding:5px 12px;border-radius:20px;margin-bottom:16px}
.art-title-main{font-size:30px;font-weight:700;letter-spacing:-.6px;line-height:1.25;margin-bottom:10px}
.art-meta-main{font-size:13px;color:var(--muted)}

.art-cover{width:100%;height:auto;max-height:640px;border-radius:var(--r);object-fit:contain;margin-bottom:36px;display:block}
.art-cover-placeholder{width:100%;height:280px;border-radius:var(--r);background:linear-gradient(135deg,var(--dark-green),var(--mid-green));margin-bottom:36px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.art-cover-placeholder span{color:rgba(255,255,255,.25);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;position:relative;z-index:1}
.art-cover-placeholder::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));opacity:.12;top:-50px;right:-30px}

.art-body{font-size:17px;line-height:1.85;color:var(--black)}
.art-body p{margin-bottom:22px}
.art-body h2{font-size:22px;font-weight:700;letter-spacing:-.3px;margin:36px 0 14px}
.art-body blockquote{border-left:3px solid var(--g1);padding:14px 22px;margin:26px 0;background:rgba(38,242,71,.06);border-radius:0 var(--rs) var(--rs) 0;font-style:italic;color:var(--dark-green)}
.art-body img{width:100%;border-radius:var(--rs);margin:22px 0;display:block}
.art-body a{color:var(--dark-green)}

.state-msg{text-align:center;color:var(--muted);padding:80px 0;font-size:15px}
</style>
</head>

  <div id="articleBody">
    <div class="state-msg" id="loadingMsg">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SUPABASE_URL = 'https://vnjhzybdsxttmsmfwsku.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_5Ffo4fNgEMGpFFtLFkh9ug_dWObFB1g';
  var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 日期格式与列表页保持完全一致:"July 6th, 2026"
  var MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

  function ordinalDay(n){
    var suf = ['th','st','nd','rd'], v = n % 100;
    return n + (suf[(v - 20) % 10] || suf[v] || suf[0]);
  }

  function composeDate(year, monthIdx, day){
    return MONTH_NAMES[monthIdx] + ' ' + ordinalDay(day) + ', ' + year;
  }

  function monthIndexOf(name){
    name = String(name).toLowerCase();
    for (var i = 0; i < 12; i++){
      if (MONTH_NAMES[i].toLowerCase().indexOf(name.replace('.','')) === 0) return i;
    }
    return -1;
  }

  function normalizeDate(raw){
    if (!raw) return '';
    var s = String(raw).trim();
    if (!s) return '';

    var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return composeDate(+iso[1], +iso[2] - 1, +iso[3]);

    var mdy = s.match(/^([A-Za-z.]+)\s+(\d{1,2})(?:st|nd|rd|th)?,?\s+(\d{4})$/);
    if (mdy){
      var mi = monthIndexOf(mdy[1]);
      if (mi > -1) return composeDate(+mdy[3], mi, +mdy[2]);
    }

    var dmy = s.match(/^(\d{1,2})(?:st|nd|rd|th)?\s+([A-Za-z.]+),?\s+(\d{4})$/);
    if (dmy){
      var mi2 = monthIndexOf(dmy[2]);
      if (mi2 > -1) return composeDate(+dmy[3], mi2, +dmy[1]);
    }

    var d = new Date(s);
    if (!isNaN(d.getTime())) return composeDate(d.getFullYear(), d.getMonth(), d.getDate());

    return s;
  }

  function formatDate(dateStr){
    return normalizeDate(dateStr);
  }

  // byline 里往往写成 "By 某某 · July 6th, 2026",拆开后日期单独标准化,避免重复或格式不一
  function buildMeta(item){
    var raw = (item.byline || '').trim();
    var author = raw, dateText = '';

    if (raw.indexOf('·') > -1) {
      var parts = raw.split('·');
      dateText = parts.pop().trim();
      author = parts.join('·').trim();
    }

    var date = normalizeDate(item.published_at) || normalizeDate(dateText) || '';
    if (!author) author = '';
    else if (!/^by\s/i.test(author)) author = 'By ' + author;

    return [author, date].filter(Boolean).join('  ·  ');
  }

  function wrapBodyWithSourceLinks(bodyHtml, item){
    if (!item.external_url) return bodyHtml;
    var name = item.source_name || 'the original source';
    var linkStyle = 'font-weight:600;color:var(--dark-green);text-decoration:none';
    var trackAttr = function(position){
      var payload = JSON.stringify({
        content_id: item.id,
        content_title: item.title || '',
        source_name: item.source_name || '',
        link_position: position,
        external_url: item.external_url
      }).replace(/"/g, '&quot;');
      return "trackEvent('press_read_full_story_click'," + payload + ")";
    };

    var topLine =
      '<p style="font-size:13px;color:var(--muted);margin-bottom:24px">Originally published on ' +
      '<a href="' + item.external_url + '" target="_blank" rel="noopener" style="' + linkStyle + '" ' +
      'onclick="' + trackAttr('top') + '">' + name + '</a></p>';

    var bottomLine =
      '<p style="margin-top:24px"><a href="' + item.external_url + '" target="_blank" rel="noopener" style="' + linkStyle + '" ' +
      'onclick="' + trackAttr('bottom') + '">' +
      'Read the full story on ' + name + ' →</a></p>';

    return topLine + (bodyHtml || '') + bottomLine;
  }

  async function loadArticle(){
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    var bodyContainer = document.getElementById('articleBody');

    if (!id) {
      bodyContainer.innerHTML = '<div class="state-msg">No article specified.</div>';
      return;
    }

    var result = await client
      .from('content_items')
      .select('*')
      .eq('id', id)
      .eq('status', 'published')
      .single();

    if (result.error || !result.data) {
      bodyContainer.innerHTML = '<div class="state-msg">This article could not be found, or is not published.</div>';
      return;
    }

    var item = result.data;
    document.title = (item.title || 'Article') + ' — MyyShop Pressroom';

    // 填充吸顶固定的头部区域(来源标签、标题、作者日期)
    document.getElementById('apPub').textContent = item.source_name || '';
    document.getElementById('apTitle').textContent = item.title || '';
    document.getElementById('apMeta').textContent = buildMeta(item);
    document.getElementById('stickyHeader').style.display = '';

    // 填充下方可滚动的封面图+正文区域
    var coverHtml = item.media_url
      ? '<img class="art-cover" src="' + item.media_url + '" alt="' + (item.title || '') + '"/>'
      : '';

    bodyContainer.innerHTML =
      coverHtml +
      '<div class="art-body">' + wrapBodyWithSourceLinks(item.description || '', item) + '</div>';
  }

  loadArticle();
})();
</script>
</body>
</html>
